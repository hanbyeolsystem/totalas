<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>음성미팅관리 — 한별시스템 임대관리</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
</head>
<body>

<button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴">☰</button>

<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-brand">
      <span class="brand-mark">🖨</span>
      <span class="brand-text">한별 임대</span>
    </a>
    <div class="sidebar-section-label">임대 관리</div>
    <nav class="sidebar-nav">
      <a href="index.html"><span class="nav-icon">🏠</span><span>임대홈</span></a>
      <a href="customers.html"><span class="nav-icon">👥</span><span>임대거래처</span></a>
      <a href="contracts.html"><span class="nav-icon">📋</span><span>임대계약서</span></a>
      <a href="counters.html"><span class="nav-icon">🖨</span><span>임대카운터</span></a>
      <a href="billing.html"><span class="nav-icon">💰</span><span>임대추가요금청구</span></a>
      <a href="prices.html"><span class="nav-icon">💵</span><span>가격표</span></a>
      <a href="meetings.html" class="active"><span class="nav-icon">🎙</span><span>음성미팅관리</span></a>
      <a href="archive.html"><span class="nav-icon">📁</span><span>고객자료실</span></a>
    </nav>
    <div class="sidebar-foot">한별시스템<br>053-588-7119</div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="main-area">
    <main class="container meetings-page">

      <div class="page-head">
        <div>
          <h1>🎙 음성미팅관리</h1>
          <p class="muted" style="margin:2px 0 0 0;">거래처별 미팅 기록을 음성·텍스트로 보관합니다. 거래처 선택 시 자동으로 연결됩니다.</p>
        </div>
        <div class="page-head-actions">
          <button class="btn ghost" id="btn-record">🔴 직접 녹음</button>
          <button class="btn primary" id="btn-add-meeting">+ 미팅 기록</button>
        </div>
      </div>

      <div class="meeting-layout">
        <aside class="meeting-list-wrap card">
          <div class="meeting-toolbar">
            <input type="text" id="meeting-search" placeholder="🔍 거래처·제목·메모 검색">
            <select id="meeting-filter-cust">
              <option value="">— 전체 거래처 —</option>
            </select>
          </div>
          <div class="cust-list-meta"><span id="meeting-count">0건</span></div>
          <ul class="meeting-list" id="meeting-list"></ul>
        </aside>

        <section class="meeting-detail" id="meeting-detail">
          <div class="cust-empty">
            <div class="cust-empty-icon">🎙</div>
            <div class="cust-empty-title">미팅 기록을 선택하거나 추가하세요</div>
            <div class="cust-empty-sub muted">우측 상단 [+ 미팅 기록] 또는 [🔴 직접 녹음]</div>
          </div>
        </section>
      </div>

    </main>
  </div>
</div>

<div id="modal-backdrop" class="modal-backdrop hidden">
  <div class="modal-box wide" id="modal-box"></div>
</div>

<template id="tpl-meeting-modal">
  <h3 id="meeting-modal-title">+ 미팅 기록 추가</h3>
  <form class="cust-form" id="meeting-form" autocomplete="off">
    <div class="form-row two">
      <label><span>거래처 * <small class="muted-small">(자동 링크)</small></span>
        <select name="customer_id" id="m-cust" required></select>
      </label>
      <label><span>일시 *</span>
        <input type="datetime-local" name="datetime" id="m-datetime" required>
      </label>
    </div>
    <div class="form-row">
      <label><span>제목 *</span><input name="title" id="m-title" required placeholder="예: 4월 카운터 협의 / 신규 견적 미팅"></label>
    </div>
    <div class="form-row">
      <label><span>참석자</span><input name="attendees" placeholder="홍길동, 김상환"></label>
    </div>

    <fieldset>
      <legend>🎙 음성 파일 <span class="muted-small">(선택)</span></legend>
      <div class="audio-drop" id="audio-drop">
        <div class="muted-small">mp3 / m4a / wav 등 음성 파일 드래그 또는 클릭</div>
        <input type="file" id="audio-file" accept="audio/*" hidden>
      </div>
      <div id="audio-preview" class="hidden"></div>
    </fieldset>

    <fieldset>
      <legend>📝 메모 <span class="muted-small">(선택)</span></legend>
      <div class="form-row">
        <label><textarea name="memo" id="m-memo" rows="6" placeholder="미팅 내용·논의사항·결정사항..."></textarea></label>
      </div>
    </fieldset>
  </form>
  <div class="modal-actions">
    <button class="btn ghost" data-close>취소</button>
    <button class="btn primary" id="meeting-save">저장</button>
  </div>
</template>

<template id="tpl-record-modal">
  <h3>🔴 음성 녹음</h3>
  <p class="muted" style="font-size:13px;">브라우저 마이크 권한 허용이 필요합니다. 녹음한 파일은 미팅 기록에 자동 첨부됩니다.</p>
  <div class="form-row two">
    <label><span>거래처</span><select id="rec-cust"></select></label>
    <label><span>제목</span><input id="rec-title" placeholder="예: 통화 메모"></label>
  </div>
  <div class="record-area" id="record-area">
    <div class="record-status" id="rec-status">⚪ 대기 중</div>
    <div class="record-time" id="rec-time">00:00</div>
    <div class="record-buttons">
      <button class="btn primary" id="rec-start">🔴 녹음 시작</button>
      <button class="btn" id="rec-stop" disabled>⏹ 중지</button>
    </div>
    <div id="rec-preview" class="hidden"></div>
  </div>
  <div class="modal-actions">
    <button class="btn ghost" data-close>취소</button>
    <button class="btn primary" id="rec-save" disabled>미팅 기록으로 저장</button>
  </div>
</template>

<script>
document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
});
document.getElementById('sidebar-backdrop')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
});
</script>
<script src="db.js"></script>
<script src="db-supa.js"></script>
<script src="app.js"></script>
<script src="meetings.js"></script>
</body>
</html>
