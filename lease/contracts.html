  <div class="main-area">
<main class="container contracts-page">

  <!-- 헤더 / 툴바 -->
  <div class="page-head no-print">
    <div>
      <h1>렌탈(임대) 계약서</h1>
      <p class="muted" style="margin:2px 0 0 0;">한별시스템 표준 양식 V.1 — 신청정보 / 계약내용 / 약관 / CMS / 특약 (3페이지 A4)</p>
    </div>
    <div class="page-head-actions">
      <button class="btn ghost" id="btn-new">+ 새 계약서</button>
      <button class="btn ghost" id="btn-fill-from-customer">👥 거래처에서 채우기</button>
      <button class="btn ghost" id="btn-import-seed" title="Supabase에서 최신 계약서 다시 불러오기">🔄 새로고침</button>
      <button class="btn ghost" id="btn-delete" title="현재 계약서 삭제">🗑 삭제</button>
      <button class="btn ghost" id="btn-print">🖨 인쇄 / PDF</button>
      <button class="btn primary" id="btn-save">💾 저장</button>
    </div>
  </div>

  <!-- 본문: 좌측 목록 + 우측 계약서 -->
  <div class="contract-layout no-print">
    <!-- 좌측: 계약서 목록 -->
    <aside class="contract-list-wrap card">
      <div class="contract-list-toolbar">
        <input type="text" id="ct-search" placeholder="🔍 거래처명 검색">
        <select id="ct-sort">
          <option value="name">이름순</option>
          <option value="recent">최근 작성순</option>
          <option value="fee">금액 큰순</option>
        </select>
      </div>
      <div class="contract-list-meta">
        <span id="ct-count">0건</span>
      </div>
      <ul class="contract-list" id="ct-list"></ul>
    </aside>

    <!-- 우측: 계약서 문서 -->
    <div class="contract-edit-wrap">
      <div class="ct-status-bar">
        <span id="ct-status-label" class="muted-small">새 계약서를 작성하거나 좌측에서 선택하세요</span>
      </div>
      <article class="contract-doc" id="contract-doc"></article>
    </div>
  </div>

  <!-- 인쇄 모드: contract-doc만 표시됨 (no-print 클래스 활용) -->

</main>

<!-- 거래처 선택 모달 -->
<div id="modal-backdrop" class="modal-backdrop hidden">
  <div class="modal-box wide" id="modal-box"></div>
</div>

<template id="tpl-customer-pick">
  <h3>👥 거래처 선택</h3>
  <p class="muted-small" style="margin:0 0 10px 0;">선택한 거래처의 정보가 계약서 신청정보에 자동으로 채워집니다.</p>
  <input type="text" id="cp-search" placeholder="🔍 거래처명·주소 검색" style="width:100%; padding:8px 10px; border:1px solid #d1d5db; border-radius:6px; margin-bottom:8px;">
  <div id="cp-list" class="customer-pick-list"></div>
  <div class="modal-actions">
    <button class="btn ghost" data-close>닫기</button>
  </div>
</template>

  </div>
</div>

<script>
document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
});
document.getElementById('sidebar-backdrop')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
});
</script>
<script src="db.js"></script>
<script src="db-supa.js"></script>
<script src="app.js"></script>
<script src="contracts.js"></script>
</body>
