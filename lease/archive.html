<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>고객자료실 — 한별시스템 임대관리</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
</head>
<body>

<button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴">☰</button>

<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-brand">
      <span class="brand-mark">🖨</span>
      <span class="brand-text">한별 임대</span>
    </a>
    <div class="sidebar-section-label">임대 관리</div>
    <nav class="sidebar-nav">
      <a href="index.html"><span class="nav-icon">🏠</span><span>임대홈</span></a>
      <a href="customers.html"><span class="nav-icon">👥</span><span>임대거래처</span></a>
      <a href="counters.html"><span class="nav-icon">🖨</span><span>임대카운터</span></a>
      <a href="billing.html"><span class="nav-icon">💰</span><span>임대추가요금청구</span></a>
      <a href="prices.html"><span class="nav-icon">💵</span><span>가격표</span></a>
      <a href="meetings.html"><span class="nav-icon">🎙</span><span>음성미팅관리</span></a>
      <a href="archive.html" class="active"><span class="nav-icon">📁</span><span>고객자료실</span></a>
    </nav>
    <div class="sidebar-foot">한별시스템<br>053-588-7119</div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="main-area">
    <main class="container archive-page">

      <div class="page-head">
        <div>
          <h1>📁 고객자료실</h1>
          <p class="muted" style="margin:2px 0 0 0;">계약서·메뉴얼·홍보물·고객사업자 등 거래처별 자료를 안전하게 보관합니다.</p>
        </div>
        <div class="page-head-actions">
          <button class="btn primary" id="btn-add-file">+ 자료 추가</button>
        </div>
      </div>

      <div class="security-banner">
        <span class="lock-icon">🔒</span>
        <div class="security-text">
          <strong>개인정보 보안 안내</strong>
          이 PC 브라우저에만 저장됩니다. 거래처 페이지의 [🗄 NAS 백업]으로 정기 백업하세요.
        </div>
      </div>

      <div class="cust-layout">
        <aside class="cust-list-wrap card">
          <div class="cust-list-toolbar">
            <input type="text" id="archive-search" placeholder="🔍 거래처 검색">
          </div>
          <div class="cust-list-meta"><span id="archive-cust-count">0곳</span></div>
          <ul class="cust-list" id="archive-cust-list"></ul>
        </aside>

        <section class="cust-detail" id="archive-detail">
          <div class="cust-empty">
            <div class="cust-empty-icon">📁</div>
            <div class="cust-empty-title">거래처를 선택하세요</div>
            <div class="cust-empty-sub muted">또는 우측 상단 [+ 자료 추가]</div>
          </div>
        </section>
      </div>

    </main>
  </div>
</div>

<div id="modal-backdrop" class="modal-backdrop hidden">
  <div class="modal-box wide" id="modal-box"></div>
</div>

<template id="tpl-file-modal">
  <h3 id="file-modal-title">+ 자료 추가</h3>
  <form class="cust-form" id="file-form" autocomplete="off">
    <div class="form-row two">
      <label><span>거래처 *</span><select name="customer_id" id="f-cust" required></select></label>
      <label><span>카테고리 *</span><select name="category" id="f-cat" required></select></label>
    </div>
    <div class="form-row">
      <label><span>제목 (선택, 미입력 시 파일명)</span><input name="title" id="f-title"></label>
    </div>

    <fieldset>
      <legend>파일 업로드</legend>
      <div class="audio-drop" id="file-drop">
        <div class="muted-small">PDF / 이미지 / 엑셀 / 워드 등 — 드래그 또는 클릭</div>
        <input type="file" id="f-file" hidden>
      </div>
      <div id="file-preview" class="hidden"></div>
    </fieldset>

    <div class="form-row">
      <label><span>메모 (선택)</span><textarea name="memo" id="f-memo" rows="2"></textarea></label>
    </div>
  </form>
  <div class="modal-actions">
    <button class="btn ghost" data-close>취소</button>
    <button class="btn primary" id="file-save">저장</button>
  </div>
</template>

<template id="tpl-file-view">
  <div class="lightbox-head">
    <h3 id="fv-title">자료</h3>
    <div>
      <button class="btn ghost small" id="fv-download">📥 다운로드</button>
      <button class="btn ghost small" data-close>닫기</button>
    </div>
  </div>
  <div class="lightbox-body" id="fv-body">
    로딩 중…
  </div>
</template>

<script>
document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
});
document.getElementById('sidebar-backdrop')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
});
</script>
<script src="db.js"></script>
<script src="app.js"></script>
<script src="archive.js"></script>
</body>
</html>
