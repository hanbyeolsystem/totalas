<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>임대거래처 — 한별시스템</title>
<link rel="stylesheet" href="../styles.css?v=20260514a">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../auth.js"></script>
<style>
  /* ===== 임대거래처 전용 인라인 스타일 ===== */
  .rc-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    align-items: start;
    margin-top: 14px;
  }
  @media (max-width: 900px) {
    .rc-layout { grid-template-columns: 1fr; }
  }

  .rc-toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 10px;
  }
  .rc-toolbar input[type=text],
  .rc-toolbar select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
  }
  .rc-toolbar input[type=text] { flex: 1; min-width: 140px; }

  /* 좌측 거래처 리스트 */
  .rc-list-card { padding: 12px; max-height: calc(100vh - 200px); overflow: auto; }
  .rc-cust-item {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .12s;
    background: #fff;
  }
  .rc-cust-item:hover {
    border-color: var(--primary);
    background: var(--primary-soft, #eff6ff);
  }
  .rc-cust-item.active {
    border-color: var(--primary);
    background: var(--primary-soft, #eff6ff);
    box-shadow: 0 0 0 2px rgba(37,99,235,.15);
  }
  .rc-cust-name { font-weight: 600; font-size: 13.5px; }
  .rc-cust-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .rc-cust-tags {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  /* 거래처 인라인 액션 (수정/만기/복원) */
  .rc-cust-item { position: relative; }
  .rc-cust-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: none;
    gap: 4px;
    z-index: 2;
  }
  .rc-cust-item:hover .rc-cust-actions,
  .rc-cust-item.active .rc-cust-actions { display: flex; }
  .rc-item-action {
    width: 24px;
    height: 24px;
    padding: 0;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    opacity: .75;
    transition: all .12s;
    color: var(--text-soft, #475569);
  }
  .rc-item-action:hover { opacity: 1; background: #f1f5f9; }
  .rc-item-action[data-action="archive"]:hover {
    background: #fee2e2;
    border-color: #fca5a5;
    color: #b91c1c;
  }
  .rc-item-action[data-action="restore"]:hover {
    background: #d1fae5;
    border-color: #6ee7b7;
    color: #065f46;
  }
  .rc-item-action[data-action="edit"]:hover {
    background: #eff6ff;
    border-color: #93c5fd;
    color: #1e40af;
  }

  /* 활성/만기 모드 라디오 */
  .rc-list-mode {
    display: flex;
    gap: 14px;
    font-size: 12.5px;
    margin-bottom: 8px;
    padding: 6px 10px;
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .rc-list-mode label {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .rc-list-mode input[type="radio"] { margin: 0; }
  .rc-cust-item.archived {
    background: #fafafa;
    border-style: dashed;
  }
  .rc-cust-item.archived .rc-cust-name { color: #64748b; }

  /* 신규 거래처 안내 배너 (계약 에디터) */
  .ct-new-customer-banner {
    margin: 0 0 10px 0;
    padding: 8px 12px;
    background: #ecfdf5;
    border: 1px solid #6ee7b7;
    border-radius: 6px;
    font-size: 12px;
    color: #065f46;
  }
  .ct-new-customer-banner strong { color: #047857; }
  .rc-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 600;
    background: #e0e7ff;
    color: #3730a3;
  }
  .rc-tag.score-hot { background: #fee2e2; color: #991b1b; }
  .rc-tag.score-mid { background: #fef3c7; color: #92400e; }
  .rc-tag.score-low { background: #d1fae5; color: #065f46; }
  .rc-tag.nas { background: #fce7f3; color: #9d174d; }

  /* 우측 상세 패널 */
  .rc-detail .card { margin-bottom: 12px; padding: 14px 16px; }
  .rc-detail h3 { margin: 0 0 10px 0; font-size: 15px; }
  .rc-detail h4 { margin: 0 0 6px 0; font-size: 13px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }

  .rc-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px 18px;
    font-size: 13px;
  }
  .rc-info-grid > div { padding: 4px 0; }
  .rc-info-grid label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: .3px;
  }

  .rc-asset-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .rc-asset-table th,
  .rc-asset-table td {
    padding: 7px 9px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .rc-asset-table th {
    background: #f8fafc;
    font-weight: 600;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .2px;
    color: var(--muted);
  }
  .rc-asset-table tbody tr:hover { background: #f9fafb; }
  .rc-cat-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 10.5px;
    font-weight: 600;
  }
  .rc-cat-it { background: #dbeafe; color: #1e40af; }
  .rc-cat-출력 { background: #fde68a; color: #92400e; }
  .rc-cat-위생 { background: #d1fae5; color: #065f46; }
  .rc-cat-기타 { background: #e5e7eb; color: #374151; }

  /* Cross-sell 인사이트 카드 */
  .rc-insight {
    padding: 10px 12px;
    border-left: 3px solid var(--primary);
    background: var(--primary-soft, #eff6ff);
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .rc-insight.warn { border-color: #d97706; background: #fffbeb; }
  .rc-insight.hot { border-color: #dc2626; background: #fef2f2; }
  .rc-insight.ok { border-color: #059669; background: #ecfdf5; }
  .rc-insight-title { font-weight: 700; margin-bottom: 2px; }
  .rc-insight-body { font-size: 12px; color: var(--text-soft, #475569); }

  .rc-as-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .rc-as-table th,
  .rc-as-table td {
    padding: 6px 9px;
    border-bottom: 1px dashed var(--border);
  }

  .rc-detail-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
  }

  /* 모달 */
  .rc-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }
  .rc-modal-backdrop.show { display: flex; }
  .rc-modal-box {
    background: #fff;
    border-radius: 12px;
    padding: 20px 22px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .rc-form-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 10px;
  }
  .rc-form-row.two {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .rc-form-row label {
    font-size: 11.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .rc-form-row input,
  .rc-form-row select,
  .rc-form-row textarea {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .rc-modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .rc-error {
    color: #dc2626;
    font-size: 12.5px;
    margin-top: 4px;
  }

  /* NAS 후보 일괄 보기 */
  .rc-nas-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    cursor: pointer;
    user-select: none;
  }

  /* 자산 행 액션 버튼 */
  .rc-asset-table th.act,
  .rc-asset-table td.act {
    text-align: right;
    white-space: nowrap;
    width: 80px;
  }
  .rc-icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 7px;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
    margin-left: 3px;
    color: var(--text-soft, #475569);
    transition: all .12s;
  }
  .rc-icon-btn:hover {
    background: #eff6ff;
    border-color: var(--primary);
    color: var(--primary);
  }
  .rc-icon-btn.danger:hover {
    background: #fee2e2;
    border-color: #dc2626;
    color: #dc2626;
  }

  /* 자산 모달 — 거래처 모달과 동일 패턴 (.rc-modal-* 재사용) */
  .rc-asset-modal-box {
    max-width: 640px;
  }
  .rc-form-divider {
    margin: 14px 0 10px 0;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-size: 11.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
    font-weight: 600;
  }
  .rc-form-row.hidden { display: none; }

  /* 토스트 */
  .rc-toast {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%) translateY(20px);
    background: #1e293b;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    opacity: 0;
    pointer-events: none;
    transition: all .2s;
    z-index: 1100;
    max-width: 90vw;
  }
  .rc-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .rc-toast.ok { background: #059669; }
  .rc-toast.err { background: #dc2626; }

  @media (max-width: 640px) {
    .rc-modal-box { max-height: 95vh; }
    .rc-form-row.two { grid-template-columns: 1fr; }
  }

  /* =============================================================
     계약서 카드 (우측 상세 패널) — 거래처별 계약서 리스트
     ============================================================= */
  .rc-ct-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 7px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #fff;
    transition: all .12s;
  }
  .rc-ct-row:hover { border-color: var(--primary); background: var(--primary-soft, #eff6ff); }
  .rc-ct-row-main { min-width: 0; flex: 1; }
  .rc-ct-row-title { font-weight: 600; font-size: 13px; }
  .rc-ct-row-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .rc-ct-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .3px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .rc-ct-badge.draft     { background: #e5e7eb; color: #374151; }
  .rc-ct-badge.signed    { background: #dbeafe; color: #1e40af; }
  .rc-ct-badge.active    { background: #d1fae5; color: #065f46; }
  .rc-ct-badge.terminated{ background: #fee2e2; color: #991b1b; }

  /* =============================================================
     계약서 에디터 풀스크린 모달
     ============================================================= */
  .ct-edit-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, .55);
    display: none;
    z-index: 1200;
  }
  .ct-edit-backdrop.show { display: block; }

  .ct-edit-modal {
    position: fixed;
    inset: 12px;
    background: #f3f5f9;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @media (max-width: 640px) {
    .ct-edit-modal { inset: 0; border-radius: 0; }
  }

  /* sticky 헤더 */
  .ct-edit-head {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .ct-edit-head .ct-h-left { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .ct-edit-head .ct-h-title { font-weight: 700; font-size: 14.5px; }
  .ct-edit-head .ct-h-meta  { font-size: 11.5px; color: var(--muted); }
  .ct-edit-head .ct-h-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .ct-edit-head select, .ct-edit-head input { font-size: 12.5px; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border-strong, #cbd5e1); }

  /* 본문 — 스크롤 */
  .ct-edit-body {
    flex: 1;
    overflow: auto;
    padding: 18px 16px 60px 16px;
    min-width: 0;
  }
  .ct-edit-body .contract-doc { min-width: 800px; margin: 0 auto; max-width: 220mm; }

  @media (max-width: 720px) {
    .ct-edit-body { padding: 12px 8px 60px 8px; }
    .ct-edit-body .contract-doc { min-width: 800px; }   /* 가로 스크롤 허용 */
  }

  /* 페이지 구분선 (화면용) */
  .ct-page-divider {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin: 8px 0 16px 0;
    letter-spacing: 1px;
  }

  /* 품목 프리셋 드롭다운 자리 */
  .ct-preset-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 6px 0 10px 0;
    font-size: 12.5px;
    flex-wrap: wrap;
  }
  .ct-preset-row select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-strong, #cbd5e1); }

  /* 행 액션 컬럼 */
  .ct-tbl-items td .ct-row-del {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--danger, #dc2626);
    padding: 2px 7px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  .ct-tbl-items td .ct-row-del:hover { background: #fee2e2; }
  .ct-row-added {
    display: inline-block;
    margin-top: 3px;
    padding: 1px 6px;
    background: #ecfdf5;
    border: 1px solid #6ee7b7;
    color: #065f46;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .2px;
  }
  .ct-input[disabled] {
    background: #f1f5f9 !important;
    color: #94a3b8;
    cursor: not-allowed;
  }

  /* 합계 박스 */
  .ct-total-box {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 8px 0;
    font-size: 12px;
  }
  .ct-total-cell {
    background: #f4f4f4;
    border: 1px solid #555;
    padding: 6px 10px;
    text-align: center;
  }
  .ct-total-cell.total { background: #fde68a; font-weight: 700; }
  .ct-total-cell label { display: block; font-size: 10.5px; color: #555; margin-bottom: 2px; letter-spacing: .5px; }
  .ct-total-cell .v { font-size: 13px; font-weight: 600; }

  /* 약관 행 */
  .ct-term-row {
    display: grid;
    grid-template-columns: 64px 1fr 80px 28px;
    gap: 8px;
    align-items: start;
    padding: 8px 0;
    border-bottom: 1px solid #e5e7eb;
  }
  .ct-term-row:last-child { border-bottom: none; }
  .ct-term-row .ct-term-no  { font-weight: 700; font-size: 11.5px; padding-top: 4px; }
  .ct-term-row .ct-term-tt  { padding-top: 4px; }
  .ct-term-row .ct-term-tt input { width: 100%; font-weight: 700; font-size: 11.5px; }
  .ct-term-row textarea { width: 100%; min-height: 56px; font-size: 11px; padding: 5px 7px; border: 1px solid var(--border); border-radius: 5px; font-family: inherit; resize: vertical; }
  .ct-term-row .ct-term-chk { padding-top: 6px; }
  .ct-term-row .ct-term-rm  { padding-top: 4px; text-align: right; }
  .ct-term-row .ct-term-rm button { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 14px; }

  /* CMS 결제수단 — 활성/비활성 */
  .ct-pay-block {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: #fff;
  }
  .ct-pay-block.disabled {
    opacity: .45;
    background: #f9fafb;
    pointer-events: none;
  }
  .ct-pay-block h5 { margin: 0 0 8px 0; font-size: 12.5px; font-weight: 700; }
  .ct-pay-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 8px;
  }
  .ct-pay-grid label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 2px; }
  .ct-pay-grid input { width: 100%; padding: 5px 7px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; }

  /* 서명 캔버스 */
  .ct-sign-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 14px;
  }
  @media (max-width: 720px) {
    .ct-sign-wrap { grid-template-columns: 1fr; }
  }
  .ct-sign-box {
    border: 1px solid #555;
    background: #fff;
    padding: 8px;
    border-radius: 4px;
  }
  .ct-sign-label {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ct-sign-canvas {
    display: block;
    width: 100%;
    height: 150px;
    border: 1px dashed #94a3b8;
    border-radius: 4px;
    background: #fcfdff;
    touch-action: none;          /* 모바일 스크롤 차단 */
    cursor: crosshair;
  }
  .ct-sign-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    color: var(--text-soft, #475569);
  }
  .ct-sign-clear:hover { background: #fee2e2; color: var(--danger); border-color: var(--danger); }

  /* 서명 모드 토글 */
  .ct-sign-mode {
    margin-bottom: 10px;
    padding: 8px 12px;
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12.5px;
  }
  .ct-sign-mode label { cursor: pointer; }

  /* 도장 모드 첨부 영역 */
  .ct-sign-stamp .ct-attach-row {
    margin: 8px 0;
    padding: 10px 12px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    background: #fafafa;
  }
  .ct-sign-stamp .ct-attach-row label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .ct-sign-stamp .ct-attach-row input[type=file] {
    display: block;
    margin-top: 4px;
    font-size: 11.5px;
  }
  .ct-sign-stamp .ct-attach-meta {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.55;
  }
  .ct-sign-stamp .ct-attach-meta.has-file {
    color: #065f46;
    background: #ecfdf5;
    border: 1px solid #6ee7b7;
    padding: 6px 8px;
    border-radius: 4px;
  }
  .ct-sign-stamp .ct-attach-meta a {

  @media print {
