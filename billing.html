<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>임대 추가요금 청구 — 한별 임대</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<style>
  /* 화면 — 청구 작성 */
  .billing-page { padding: 18px; }
  .billing-head { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .billing-head h1 { margin:0; font-size:22px; }
  .billing-tabs { display:flex; gap:6px; }
  .billing-tabs button { padding:7px 14px; border:1px solid var(--border); background:#fff; border-radius:6px; cursor:pointer; font-size:13.5px; }
  .billing-tabs button.active { background:var(--primary,#2563eb); color:#fff; border-color:var(--primary,#2563eb); }

  .billing-form { background:#fff; border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:14px; }
  .form-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px; }
  .form-grid label { display:block; font-size:12.5px; color:var(--muted,#64748b); margin-bottom:4px; font-weight:600; }
  .form-grid input, .form-grid select { width:100%; padding:7px 9px; border:1px solid var(--border); border-radius:6px; font-size:13.5px; }
  .form-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .form-actions button { padding:8px 16px; border-radius:6px; border:1px solid var(--border); cursor:pointer; font-size:13.5px; }
  .btn-primary { background:var(--primary,#2563eb); color:#fff; border-color:var(--primary,#2563eb); }
  .btn-ghost   { background:#fff; }
  .btn-success { background:#16a34a; color:#fff; border-color:#16a34a; }
  .btn-danger  { background:#dc2626; color:#fff; border-color:#dc2626; }

  /* 계산 결과 표 */
  .calc-result { background:#fff; border:1px solid var(--border); border-radius:8px; padding:16px; }
  .serial-block { margin-bottom:18px; }
  .serial-block h4 { margin:0 0 8px 0; font-size:14px; padding:6px 10px; background:#f8fafc; border-radius:4px; }
  table.calc-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.calc-table th, table.calc-table td { padding:6px 8px; border-bottom:1px solid #e5e7eb; text-align:right; }
  table.calc-table th { background:#f8fafc; font-weight:600; }
  table.calc-table td.tl, table.calc-table th.tl { text-align:left; }
  table.calc-table tr.section-header th { background:#eef2ff; color:#1e40af; }
  table.calc-table tr.section-bw th  { background:#f3f4f6; }
  table.calc-table tr.section-co th  { background:#fef3c7; }
  table.calc-table .neg { color:#9ca3af; }
  table.calc-table .pos { color:#dc2626; font-weight:600; }
  table.calc-table tfoot td { background:#f8fafc; font-weight:700; }

  .summary-card { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:12px; margin-top:14px; }
  .summary-card > div { background:#f8fafc; border:1px solid var(--border); border-radius:6px; padding:10px 12px; }
  .summary-card .lbl { font-size:11.5px; color:var(--muted,#64748b); }
  .summary-card .val { font-size:18px; font-weight:700; margin-top:2px; }
  .summary-card .total .val { color:var(--primary,#2563eb); font-size:20px; }

  /* 이력 목록 */
  .billing-list-wrap { background:#fff; border:1px solid var(--border); border-radius:8px; overflow-x:auto; }
  table.billing-list { width:100%; border-collapse:collapse; font-size:13px; }
  table.billing-list th, table.billing-list td { padding:8px 10px; border-bottom:1px solid #e5e7eb; }
  table.billing-list th { background:#f8fafc; text-align:left; font-weight:600; }
  table.billing-list td.r { text-align:right; }
  table.billing-list tr.paid { color:#16a34a; }
  table.billing-list tr.paid td.status { font-weight:700; }
  table.billing-list tr.unpaid td.status { color:#dc2626; font-weight:600; }
  table.billing-list tr:hover { background:#f8fafc; cursor:pointer; }

  /* 인쇄 미리보기 */
  .print-area {
    background:#fff; padding:24px; border:1px solid var(--border); border-radius:8px;
    max-width:780px; margin:0 auto; font-size:13px; color:#111;
  }
  .print-area h1 { font-size:22px; text-align:center; margin:0 0 6px; letter-spacing:8px; }
  .print-area .print-sub { text-align:center; color:#444; margin-bottom:18px; }
  .print-area .biz-block { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .print-area .biz-block .col { border:1px solid #cbd5e1; padding:10px; }
  .print-area .biz-block .col .row { display:flex; gap:8px; margin-bottom:4px; }
  .print-area .biz-block .col .row .k { width:70px; color:#475569; font-weight:600; }
  .print-area .biz-block .col .row .v { flex:1; }
  .print-area table.print-tbl { width:100%; border-collapse:collapse; font-size:11.5px; margin-bottom:10px; }
  .print-area table.print-tbl th, .print-area table.print-tbl td { border:1px solid #94a3b8; padding:4px 6px; text-align:right; }
  .print-area table.print-tbl th { background:#f1f5f9; }
  .print-area table.print-tbl td.tl, .print-area table.print-tbl th.tl { text-align:left; }
  .print-area .grand-total { display:flex; justify-content:flex-end; gap:18px; margin-top:6px; }
  .print-area .grand-total .lbl { font-weight:700; }
  .print-area .grand-total .val { font-size:18px; font-weight:800; color:#1d4ed8; }
  .print-area .foot-bank { margin-top:18px; border-top:2px solid #1e40af; padding-top:10px; font-size:12.5px; color:#334155; }

  @media print {
    body * { visibility: hidden !important; }
    .print-area, .print-area * { visibility: visible !important; }
    .print-area { position:absolute; top:0; left:0; width:100%; max-width:none; border:none; padding:10mm; }
    .sidebar, .mobile-menu-btn, .billing-head, .billing-form, .form-actions, .footer, .billing-tabs { display:none !important; }
  }

  @media (max-width: 720px) {
    .billing-page { padding: 12px; }
    .summary-card { grid-template-columns: 1fr 1fr; }
    table.calc-table { font-size:11px; }
    table.calc-table th, table.calc-table td { padding:4px 5px; }
  }
</style>
</head>
<body>

<button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴">☰</button>

<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-brand">
      <span class="brand-mark">🖨</span>
      <span class="brand-text">한별 임대</span>
    </a>
    <div class="sidebar-section-label">임대 관리</div>
    <nav class="sidebar-nav">
      <a href="index.html"><span class="nav-icon">🏠</span><span>임대홈</span></a>
      <a href="customers.html"><span class="nav-icon">👥</span><span>임대거래처</span></a>
      <a href="contracts.html"><span class="nav-icon">📋</span><span>임대계약서</span></a>
      <a href="counters.html"><span class="nav-icon">🖨</span><span>임대카운터</span></a>
      <a href="billing.html" class="active"><span class="nav-icon">💰</span><span>임대추가요금청구</span></a>
      <a href="prices.html"><span class="nav-icon">💵</span><span>가격표</span></a>
      <a href="meetings.html"><span class="nav-icon">🎙</span><span>음성미팅관리</span></a>
      <a href="archive.html"><span class="nav-icon">📁</span><span>고객자료실</span></a>
    </nav>
    <div class="sidebar-foot">한별시스템<br>053-588-7119</div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="main-area">
    <main class="container billing-page">

      <div class="billing-head">
        <div>
          <h1>💰 임대 추가요금 청구</h1>
          <p class="muted" style="margin:4px 0 0 0; font-size:13px;">월 카운터 기반 자동 계산 · 청구서 발행 · 입금 관리</p>
        </div>
        <div class="billing-tabs">
          <button data-tab="compose" class="active">✏️ 청구 작성</button>
          <button data-tab="list">📜 청구 이력 <span id="list-count" class="muted-small"></span></button>
        </div>
      </div>

      <!-- ────── 작성 모드 ────── -->
      <section id="tab-compose">
        <div class="billing-form">
          <div class="form-grid">
            <div>
              <label>거래처</label>
              <input list="customer-list" id="customer-search" placeholder="회사명 검색…" autocomplete="off">
              <datalist id="customer-list"></datalist>
            </div>
            <div>
              <label>기간 시작 (월)</label>
              <input type="month" id="period-start">
            </div>
            <div>
              <label>기간 종료 (월)</label>
              <input type="month" id="period-end">
            </div>
            <div>
              <label>청구일자</label>
              <input type="date" id="issued-at">
            </div>
          </div>
          <div class="form-actions" style="align-items:center;">
            <button class="btn-primary" id="btn-calc">🧮 계산</button>
            <button class="btn-ghost"   id="btn-reset">↺ 초기화</button>
            <span id="period-hint" class="muted-small" style="margin-left:auto; font-size:12px;"></span>
          </div>
        </div>

        <div class="calc-result" id="calc-result" style="display:none;">
          <div id="customer-info" style="margin-bottom:12px;"></div>
          <div id="serials-area"></div>

          <div class="summary-card">
            <div><div class="lbl">기본료(임대료)</div><div class="val" id="sum-base">—</div></div>
            <div><div class="lbl">흑백 추가료</div><div class="val" id="sum-bw">—</div></div>
            <div><div class="lbl">컬러 추가료</div><div class="val" id="sum-co">—</div></div>
            <div class="total"><div class="lbl">총 청구금액</div><div class="val" id="sum-total">—</div></div>
          </div>

          <div class="form-actions" style="margin-top:14px;">
            <button class="btn-success" id="btn-save">💾 청구 저장</button>
            <button class="btn-ghost"   id="btn-preview">👁 인쇄 미리보기</button>
            <button class="btn-ghost"   id="btn-print">🖨 바로 인쇄</button>
          </div>
        </div>
      </section>

      <!-- ────── 이력 모드 ────── -->
      <section id="tab-list" style="display:none;">
        <div class="billing-form" style="padding:10px 14px;">
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <input type="text" id="list-search" placeholder="회사명·청구번호 검색" style="flex:1; min-width:160px; padding:7px 9px; border:1px solid var(--border); border-radius:6px;">
            <select id="list-filter" style="padding:7px 9px; border:1px solid var(--border); border-radius:6px;">
              <option value="all">전체</option>
              <option value="unpaid">미입금만</option>
              <option value="paid">입금완료</option>
            </select>
          </div>
        </div>
        <div class="billing-list-wrap">
          <table class="billing-list">
            <thead>
              <tr>
                <th>청구번호</th>
                <th>거래처</th>
                <th>기간</th>
                <th>발행일</th>
                <th class="r">기본료</th>
                <th class="r">추가료</th>
                <th class="r">총액</th>
                <th>입금</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="billing-list-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- ────── 인쇄 미리보기 ────── -->
      <section id="tab-print" style="display:none;">
        <div style="text-align:right; margin-bottom:10px;">
          <button class="btn-primary" id="btn-do-print">🖨 인쇄</button>
          <button class="btn-ghost"   id="btn-back">← 돌아가기</button>
        </div>
        <div class="print-area" id="print-area"></div>
      </section>

    </main>

    <footer class="footer">
      <div class="footer-inner muted">
        한별시스템 · 대구광역시 달서구 문화회관11안길 22-7 1층 · 010-4585-6890
      </div>
    </footer>
  </div>
</div>

<script>
document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
});
document.getElementById('sidebar-backdrop')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
});
</script>
<script src="db.js"></script>
<script src="db-supa.js"></script>
<script src="app.js"></script>
<script src="billing.js"></script>
</body>
</html>
